<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/dish_template.css">
    <link rel="stylesheet" href="./styles/cart_template.css">
    <link rel="stylesheet" href="./styles/dialogs.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/responsive.css">
    <link rel="icon" type="favicon" href="assets/icons/favicon.png">

    <script src="./scripts/dishes.js"></script>
    <script src="./scripts/dishes_templates.js"></script>
    <script src="./scripts/cart_template.js"></script>
    <script src="./script.js"></script>
</head>
<body onload="init()">
   
    <header>
        <nav>
          <div class="contentWrapperNav">
            <img id="bestellapp_logo" src="assets/img/bestellapp_logo.png" alt="Bestell App Logo">
            <img src="assets/icons/menu.png" alt="Menü Icon" id="menuIcon">
          </div>
        </nav>
            <img id="header_img" src="assets/img/ribeye_steak.png" alt="Menü Hintergrundbild">
            <div class="logo-wrapper">
            <img src="./assets/img/logo_round.png" id="logo_img">
            </div>
    </header> 

    <main>
        <section id="logo_section">
                <div class="headline_container">
                    <h2 class="headline">Steak House</h2>
                    <div class="rating">
                        <b style="color: #C6A75E;">4.8</b><p>(471)</p>
                    </div>
                </div>
                <p class="subline">Premium cuts. Open flame. Pure flavor.</p>
        </section>

        <section class="menucardContentWrapper">
        <section class="content">

          <div class="menu_navigation">
                  <a href="#menuSection">Premium Cuts</a>
                  <a href="#SidesSection">Sides</a>
                  <a href="#DrinksSection">Drinks</a>
          </div>
        
        <section id="menuSection">
            <div class="section_bar">
              <div class="contentWrapperBar">
                <img src="./assets/icons/meat.png">
                <h2 class="section_title">Prime Cuts</h2>
              </div>
            </div>

            <div class="contentWrapper">
              <div id="meat_dishes">
                <!-- Menü-Items would be dynamically inserted here -->
              </div>
            </div>
        </section>

        <section id="SidesSection">
            <div class="section_bar">
              <div class="contentWrapperBar">
                <img src="./assets/icons/fries.png">
                <h2 class="section_title">Sides</h2>
              </div>
            </div>

            <div class="contentWrapper">
              <div id="side_dishes">
                <!-- Sides-Items would be dynamically inserted here -->
              </div>
            </div>
        </section>

        <section id="DrinksSection">
            <div class="section_bar">
              <div class="contentWrapperBar">
                <img src="./assets/icons/vino.png">
                <h2 class="section_title">Drinks</h2>
              </div>
            </div>

            <div class="contentWrapper">
              <div id="drinks">
                <!-- Drinks-Items would be dynamically inserted here -->
              </div>
            </div>
        </section>

        <button class="button" onclick="showBasketMobileDialog()" id="basketMobile">Open Basket</button>
        </section>

        <section class="basketWrapper">
          <div class="basket" id="basket">
            <h2 class="basketTitle">Your Basket</h2>
            <div id="shoppingCartDesktop">
              <div id="dishWrapper">
              <!-- Shopping cart items will be rendered here -->
              </div>
              <div id="priceSection">
              <!-- Prices will be rendered here -->
              </div>
            </div>
          </div>
        </section>

        <dialog id="orderSuccessDialog">
          <div class="right">
            <img src="./assets/icons/close.png" onclick="hideOrderSuccessDialog()" class="closeIcon">
          </div>
          <div class="centered">  
            <img src="./assets/icons/foodtruck.png" id="foodtruck">
            <h1>Order confirmed!</h1>
            <p>Your food is on the way!</p>
          </div>
        </dialog>

        <dialog id="mobileBasketDialog">
          <header>
            <h2>Your Basket</h2>
            <img src="./assets/icons/close.png" onclick="hideBasketMobile()" class="closeIcon">
          </header>
          <main>
              <div id="basketMobile">
                <div id="shoppingCartMobile">
                  <div id="mobileDishWrapper">
                  <!-- Shopping cart items will be rendered here -->
                  </div>
                  <div id="mobilePriceSection">
                  <!-- Prices will be rendered here -->
                  </div>
                </div>
              </div>
          </main>

        </dialog>

        </section>

    </main>

    <footer>
      <div class="contentWrapperFooter">
        <p>&copy; 2024 Bestell App</p>
        <a href="datenschutz.html">Privacy Policy</a>
        <a href="impressum.html">Legal Notice</a>
      </div>
    </footer>
</body>
</html>
